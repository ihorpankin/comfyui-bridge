<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
            color: var(--uxp-host-text-color, #e0e0e0);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .footer {
            flex-shrink: 0;
            padding: 12px;
            padding-top: 0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .mode-section sp-detail {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        sp-progressbar {
            width: 100%;
        }

        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-status-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        sp-button#generateBtn {
            width: 100%;
        }

        /* Settings dialog */
        dialog {
            background: var(--uxp-host-background-color, #323232);
            color: var(--uxp-host-text-color, #e0e0e0);
            border: 1px solid var(--uxp-host-border-color, #444);
            border-radius: 8px;
            padding: 16px;
            width: 280px;
        }

        dialog .form-row {
            margin: 12px 0;
        }

        dialog sp-textfield {
            width: 100%;
        }

        dialog .dialog-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .test-result {
            font-size: 11px;
            margin-top: 4px;
            min-height: 16px;
        }

        .test-result.success { color: var(--spectrum-semantic-positive-color-default, #4caf50); }
        .test-result.error { color: var(--spectrum-semantic-negative-color-default, #f44336); }

        /* Preview section */
        #previewSection {
            flex-shrink: 1;
            min-height: 0;
        }

        .preview-container {
            position: relative;
            background: var(--uxp-host-background-color, #1e1e1e);
            border: 1px solid var(--uxp-host-border-color, #444);
            border-radius: 4px;
            overflow: hidden;
            line-height: 0;
        }

        .preview-container img {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            cursor: pointer;
        }

        .preview-container img:hover {
            opacity: 0.85;
        }

        .preview-dismiss {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border: none;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border-radius: 50%;
            font-size: 12px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
            padding: 0;
        }

        .preview-dismiss:hover {
            background: var(--spectrum-semantic-negative-color-default, rgba(244, 67, 54, 0.8));
        }

        .preview-hint {
            position: absolute;
            bottom: 6px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: var(--uxp-host-text-color, rgba(255, 255, 255, 0.5));
            opacity: 0.5;
            pointer-events: none;
        }

        .settings-helper {
            font-size: 10px;
            color: var(--uxp-host-text-color, #999);
            opacity: 0.6;
            margin-top: 2px;
        }

        /* History section */
        .history-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .history-thumb {
            width: 72px;
            height: 72px;
            border-radius: 4px;
            border: 2px solid var(--uxp-host-border-color, #444);
            object-fit: cover;
            cursor: pointer;
            opacity: 0.75;
            transition: opacity 0.15s, border-color 0.15s;
        }

        .history-thumb:hover {
            opacity: 1;
            border-color: var(--uxp-host-text-color, #ccc);
        }

        .history-thumb.latest {
            border-color: var(--spectrum-semantic-positive-color-default, #4caf50);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Scrollable content -->
    <div class="content">
        <!-- Header -->
        <div class="header">
            <div class="connection-status">
                <sp-status-light id="connStatus" variant="negative" size="m">
                    <sp-detail id="connLabel">Disconnected</sp-detail>
                </sp-status-light>
            </div>
            <sp-action-button quiet id="settingsBtn" title="Settings" aria-label="Connection settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" slot="icon">
                    <path fill="currentColor" d="M16.45 7.4l-1.63-.27a5.67 5.67 0 0 0-.52-1.27l.96-1.32a.5.5 0 0 0-.05-.65l-1.1-1.1a.5.5 0 0 0-.65-.05l-1.32.96a5.67 5.67 0 0 0-1.27-.52L10.6 1.55a.5.5 0 0 0-.5-.42H8.55a.5.5 0 0 0-.49.42L7.8 3.18a5.67 5.67 0 0 0-1.27.52l-1.32-.96a.5.5 0 0 0-.65.05l-1.1 1.1a.5.5 0 0 0-.05.65l.96 1.32a5.67 5.67 0 0 0-.52 1.27l-1.63.27a.5.5 0 0 0-.42.5v1.55a.5.5 0 0 0 .42.49l1.63.27c.13.44.3.87.52 1.27l-.96 1.32a.5.5 0 0 0 .05.65l1.1 1.1a.5.5 0 0 0 .65.05l1.32-.96c.4.22.83.4 1.27.52l.27 1.63a.5.5 0 0 0 .49.42h1.55a.5.5 0 0 0 .5-.42l.27-1.63c.44-.13.87-.3 1.27-.52l1.32.96a.5.5 0 0 0 .65-.05l1.1-1.1a.5.5 0 0 0 .05-.65l-.96-1.32c.22-.4.4-.83.52-1.27l1.63-.27a.5.5 0 0 0 .42-.49V7.9a.5.5 0 0 0-.42-.5zM9.32 12a3 3 0 1 1 3-3 3 3 0 0 1-3 3z"/>
                </svg>
            </sp-action-button>
        </div>

        <sp-divider size="s"></sp-divider>

        <!-- Mode -->
        <div class="mode-section">
            <sp-detail id="modeLabel">Selection as Mask</sp-detail>
            <sp-switch id="modeSwitch" aria-label="Toggle between mask mode and crop mode"></sp-switch>
        </div>

        <sp-divider size="s"></sp-divider>

        <!-- Progress (hidden by default) -->
        <div class="progress-section" id="progressSection" hidden aria-live="polite">
            <div class="progress-status-row">
                <sp-status-light id="progressStatus" variant="info" size="s"></sp-status-light>
                <sp-detail id="statusLabel"></sp-detail>
            </div>
            <sp-progressbar id="progressBar" value="0" max="100"></sp-progressbar>
        </div>

        <!-- Preview (hidden by default) -->
        <div id="previewSection" hidden>
            <sp-detail>Result Preview</sp-detail>
            <div class="preview-container">
                <img id="previewImage" alt="AI generation result preview" role="button" tabindex="0" aria-label="Click to apply result to canvas" />
                <button class="preview-dismiss" id="dismissPreview" title="Dismiss preview" aria-label="Dismiss preview">&times;</button>
                <span class="preview-hint">Click image to apply</span>
            </div>
        </div>

        <!-- History -->
        <sp-divider size="s"></sp-divider>
        <div class="history-header">
            <sp-detail id="historyLabel">History</sp-detail>
            <sp-switch id="historySwitch" aria-label="Toggle history on or off"></sp-switch>
        </div>
        <div id="historyControls" hidden style="display:none;">
            <sp-action-button quiet id="clearHistoryBtn" title="Clear history" aria-label="Clear history">
                <sp-label>Clear all</sp-label>
            </sp-action-button>
        </div>
        <div class="history-grid" id="historyGrid" hidden></div>
    </div>

    <!-- Fixed footer -->
    <div class="footer">
        <sp-button variant="cta" id="generateBtn">Generate</sp-button>
    </div>

    <!-- Settings Dialog -->
    <dialog id="settingsDialog" aria-label="Connection Settings">
        <sp-heading size="S">Connection Settings</sp-heading>
        <sp-divider size="s"></sp-divider>
        <div class="form-row">
            <sp-textfield id="serverUrl" placeholder="http://127.0.0.1:8188">
                <sp-label slot="label">Server URL (ComfyUI)</sp-label>
            </sp-textfield>
            <div class="settings-helper">Enter the URL where ComfyUI is running</div>
        </div>
        <div class="test-result" id="testResult" aria-live="polite"></div>
        <div class="dialog-buttons">
            <sp-button quiet id="cancelBtn">Cancel</sp-button>
            <sp-button id="testBtn">Test</sp-button>
            <sp-button variant="cta" id="saveBtn">Save</sp-button>
        </div>
    </dialog>

    <script src="main.js"></script>
</body>
</html>
